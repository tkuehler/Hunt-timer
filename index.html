<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful new tab experience for hunters with hunting season countdowns">
  <title>Hunt Clock - New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="backdrop"></div>

  <!-- Top-left: collapsible Google search -->
  <div class="search-corner" id="search-corner">
    <button id="search-toggle" class="icon-circle" aria-label="Open search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <form id="search-form" class="search-form" role="search">
      <input type="text" class="search-input" id="search-input" placeholder="Search Google…" aria-label="Search Google">
      <button type="submit" class="search-submit" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </button>
    </form>
  </div>

  <!-- Top-right: configuration menu -->
  <div class="menu-corner" id="menu-corner">
    <button id="menu-button" class="icon-circle menu-button" aria-label="Menu" aria-haspopup="true" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="5" r="1.8"></circle><circle cx="12" cy="12" r="1.8"></circle><circle cx="12" cy="19" r="1.8"></circle></svg>
    </button>
    <div class="menu-dropdown" id="menu-dropdown" role="menu">
      <button class="menu-item" id="menu-location" role="menuitem">
        <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></span>
        Set Location
      </button>
      <button class="menu-item" id="menu-add-season" role="menuitem">
        <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></span>
        Add Season
      </button>
      <button class="menu-item" id="menu-privacy" role="menuitem">
        <span class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
        Privacy Policy
      </button>
    </div>
  </div>

  <div class="container">
    <p class="quote" id="quote" aria-live="polite"></p>

    <div class="time">
      <div id="clock" aria-live="polite">--:--</div>
      <div id="date" aria-live="polite">Loading...</div>
    </div>

    <div class="greeting" id="greeting" aria-live="polite">Welcome, hunter</div>
    
    <div class="countdown-container" id="countdown-container" aria-label="Hunting season countdowns">
      <!-- Countdown tiles will be dynamically inserted here -->
    </div>
    
    <div class="footer">
      <span>Check your local wildlife agency for specific regulations</span>
      <div class="location" id="location">Location: <span id="location-text">Loading...</span></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay"></div>
  
  <div class="custom-season-modal" id="custom-season-modal" aria-labelledby="custom-season-title">
    <div class="modal-header">
      <h3 class="modal-title" id="custom-season-title">Add Custom Season</h3>
      <button class="close-button" id="close-modal" aria-label="Close modal">✕</button>
    </div>
    <form class="season-form" id="season-form">
      <div class="form-group">
        <label for="season-type">Season Type</label>
        <select id="season-type" required>
          <option value="">Select Game Animal</option>
          <!-- Options will be populated dynamically based on location -->
          <option value="whitetail_deer">Whitetail Deer</option>
          <option value="mule_deer">Mule Deer</option>
          <option value="dove">Dove</option>
          <option value="turkey_spring">Spring Turkey</option>
          <option value="turkey_fall">Fall Turkey</option>
          <option value="duck">Duck</option>
          <option value="goose">Goose</option>
          <option value="quail">Quail</option>
          <option value="pheasant">Pheasant</option>
          <option value="elk">Elk</option>
          <option value="javelina">Javelina</option>
          <option value="hog">Feral Hog</option>
          <option value="squirrel">Squirrel</option>
          <option value="rabbit">Rabbit</option>
          <option value="custom">Custom...</option>
        </select>
      </div>
      <div class="form-group" id="custom-name-group" style="display: none;">
        <label for="custom-name">Custom Name</label>
        <input type="text" id="custom-name" placeholder="e.g., Mule Deer">
      </div>
      <div class="form-group">
        <label for="season-date">Season Start Date</label>
        <input type="date" id="season-date" required>
      </div>
      <button type="submit" class="add-button">Add Season</button>
    </form>
  </div>

  <div class="location-modal" id="location-modal" aria-labelledby="location-title">
    <div class="modal-header">
      <h3 class="modal-title" id="location-title">Set Your Location</h3>
      <button class="close-button" id="close-location-modal" aria-label="Close modal">✕</button>
    </div>
    <form class="location-form" id="location-form">
      <div class="form-group">
        <label for="state-select">Select Your State</label>
        <select id="state-select" required>
          <option value="">Select State</option>
          <!-- States will be populated by JavaScript -->
        </select>
      </div>
      <div class="form-group">
        <label for="hunter-name">Your Name (optional)</label>
        <input type="text" id="hunter-name" placeholder="e.g., Travis" maxlength="40">
      </div>
      <button type="submit" class="add-button">Save Location</button>
    </form>
  </div>
  
  <div class="privacy-modal" id="privacy-modal" aria-labelledby="privacy-title">
    <div class="modal-header">
      <h3 class="modal-title" id="privacy-title">Privacy Policy</h3>
      <button class="close-button" id="close-privacy-modal" aria-label="Close modal">✕</button>
    </div>
    <div class="privacy-content">
      <!-- Privacy policy content will be inserted here -->
    </div>
  </div>
  
  <script src="seasons-data.js"></script>
  <script src="background-images.js"></script>
  <!-- Load Texas counties data for geolocation feature -->
  <script src="texas-counties-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
